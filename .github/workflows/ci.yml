name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Library.domain.sln

      - name: Build
        run: dotnet build Library.domain.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Library.domain.sln --no-build --configuration Release
